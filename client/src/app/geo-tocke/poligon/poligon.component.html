<!-- google-map- -->
<google-map height="630px" width="100%" [zoom]="zoom" [center]="center" [options]="options"
  (mapClick)="onMapClick($event)">

  <map-polygon #polygonElem *ngFor="let pol of poligon?.noviObodiLatLng" [paths]="pol" [options]="polyOptions">
  </map-polygon>
</google-map>

@if (clickedLat !== null && clickedLng !== null) {
<div>
  <p>Lat: {{clickedLat}}, Lng: {{clickedLng}}</p>
</div>
}
