<nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
  <div class="container">
    <a class="navbar-brand" routerLink="/">
      <i class="fa fa-university ms-2" style="color: rgb(196, 253, 64);"></i>
    </a>

    <ul class="navbar-nav me-auto mb-2 mb-md-0">
      @if (accountService.currentUser()) {
      <li class="nav-item">
        <a routerLink="/stavbe" routerLinkActive="active" class="nav-link">Stavbe</a>
      </li>

      <li class="nav-item">
        <a routerLink="/moj-elektro" routerLinkActive="active" class="nav-link">Moj Elektro</a>
      </li>
      <li class="nav-item">
        <a routerLink="/messages" routerLinkActive="active" class="nav-link">Trendi</a>
      </li>
      <li *appHasRole="['Admin', 'Moderator']" class="nav-item" style="margin-left: 3cm;">
        <a routerLink="/admin" routerLinkActive="active" class="nav-link">Admin</a>
      </li>
      <li *appHasRole="['Admin']" class="nav-item">
        <a routerLink="/members" routerLinkActive="active" class="nav-link">Uporabniki</a>
      </li>
      }
      <li class="nav-item">
        <a routerLink="/errors" routerLinkActive="active" class="nav-link">Errors</a>
      </li>

    </ul>

    @if (accountService.currentUser()) {
    <div dropdown class="dropdown">
      <img class="me-2" src="{{accountService.currentUser()?.photoUrl || './assets/user.png'}}" alt="User main image">
      <a dropdownToggle class="dropdown-toggle text-light text-decoration-none">
        Welcome {{accountService.currentUser()?.knownAs}}
      </a>
      <div *dropdownMenu class="dropdown-menu">
        <a routerLink="member/edit" class="dropdown-item">Edit profile</a>
        <div class="dropdown-divider"></div>
        <a class="dropdown-item" (click)="logout()">Logout</a>
      </div>
    </div>
    }

    @if (!accountService.currentUser()) {
    <form #loginForm="ngForm" (ngSubmit)="login()" class="d-flex" autocomplete="off">
      <input name="username" [(ngModel)]="model.username" class="form-control me-2" placeholder="Username">
      <input name="password" [(ngModel)]="model.password" class="form-control me-2" placeholder="Password"
        type="password">
      <button class="btn btn-success" type="submit">Login</button>
    </form>
    }
  </div>
</nav>
