<h4 class="d-flex align-items-center gap-3">
    <span>
        Merilno mesto: {{mojElektroService.mojElektroSignal()?.enotniIdentifikator}}
        {{mojElektroService.mojElektroSignal()?.nazivJavnegaObjekta}}
    </span>
    <input type="text" class="form-control"
        placeholder="{{selectedRange.value[0] | date:'dd-MM-yyyy'}}  do: {{selectedRange.value[1] | date:'dd-MM-yyyy'}}"
        bsDaterangepicker (bsValueChange)="onValueChange($event)"
        [bsConfig]="{ ranges: ranges, dateInputFormat: 'dd-MM-yyyy' }" [(ngModel)]="selectedRange"
        style="width: 300px;">
</h4>
<div style="height: 2px; background-color: #aca3a3; margin-bottom: 55px;"></div>
<app-moj-elektro-graf [eChartsEnergijaAPlus]="chartData" [trimMode]="'first4'" [lineStyle]="lineStyle" [legendConfig]="legendConfig"></app-moj-elektro-graf>
<div *ngIf="error" class="alert alert-danger" role="alert">
    {{error}}
